# ==================== V2Wall 被控端配置 ====================
agent:
  # --- 主控端地址 ---
  # 主控管理入口的完整 URL（包含管理路径前缀，例如 /admin-a3f2b1c5）
  # 注意：结尾不要带斜杠，例如 "https://master.example.com/admin-a3f2b1c5"
  master_url: "https://master.example.com/admin-a3f2b1c5"

  # --- 认证 ---
  # 必须与主控的 sync_token 一致
  sync_token: "sync-secret-token"

  # --- 同步与阻断配置 ---
  # 黑名单同步间隔（秒）。被控端每间隔该秒数拉取最新黑/白名单并更新防火墙。
  sync_interval_sec: 300

  # 本地静态白名单（CIDR 列表），这些地址绝对不会被封禁。
  # 务必包含：本机回环地址、主控端 IP、常用管理 IP 等，防止误封。
  local_whitelist:
    - "127.0.0.1/32"
    - "::1/128"                 # IPv6 回环
    - "10.0.0.0/8"              # 示例：内网管理网段
    # 添加主控端公网 IP：
    # - "203.0.113.10/32"

  # --- 可选诱饵服务 ---
  honeypot:
    # 是否启用本地诱饵服务（监听独立端口，收集扫描日志并上报主控）
    enabled: false

    # 诱饵监听端口（若启用，请确保该端口网络可达，可直接暴露或经 Nginx 反代）
    port: 8081

    # 静态页面目录（可选）。若为空，则使用内嵌的默认诱饵页面和 404 页面。
    # 指定后，将从此目录读取 index.html 和 404.html，可自行替换伪装内容。
    static_dir: ""

    # 日志上报周期（秒）。被控端收集到的诱饵日志会每间隔该秒数上报一次主控。
    report_interval_sec: 60
